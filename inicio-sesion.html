<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Login & Registro</title>
    <style>
        :root {
            --primary-color: #1abc9c;
            --secondary-color: #16a085;
            --background-color: #111;
            --text-color: #fff;
            --shadow-color: rgba(26, 188, 156, 0.7);
            --hover-shadow-color: rgba(26, 188, 156, 1);
            --border-color: #222;
            --muted-color: #aaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: var(--background-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: var(--border-color);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 15px var(--shadow-color);
            width: 320px;
            text-align: center;
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        label {
            color: var(--muted-color);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.7rem;
            margin-top: 0.3rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: #222;
            color: var(--text-color);
            border-color: var(--muted-color);
        }

        button {
            width: 100%;
            padding: 0.7rem;
            background: var(--primary-color);
            border: none;
            color: var(--text-color);
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--secondary-color);
            box-shadow: 0 0 10px var(--hover-shadow-color);
        }

        .switch {
            margin-top: 1rem;
            color: var(--muted-color);
            font-size: 0.9rem;
        }

        .switch a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        .icon-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
        }

        .profile-icon, .fullscreen-icon, .search-icon {
            margin-left: 20px;
            cursor: pointer;
            transition: text-shadow 0.3s;
        }
    
        .profile-icon:hover, .fullscreen-icon:hover, .search-icon:hover {
            text-shadow: 0 0 5px var(--primary-color), 0 0 10px var(--primary-color);
        }
    
        .profile-icon i, .fullscreen-icon i, .search-icon i {
            font-size: 1.5rem;
            color: var(--primary-color);
            text-shadow: 0 0 5px var(--primary-color);
        }

        .site-title {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2rem;
            color: var(--primary-color);
            transition: transform 0.3s ease;
        }
    
        @keyframes glitch {
            0%, 40%, 100% { 
                text-shadow: 1px 1px 0 var(--primary-color), -1px -1px 0 var(--secondary-color); 
                transform: translate(1px, 1px); 
            }
            10%, 30% { 
                text-shadow: -1px -1px 0 var(--primary-color), 1px 1px 0 var(--secondary-color); 
                transform: translate(-1px, -1px); 
            }
            20% { 
                text-shadow: 1px 1px 0 var(--secondary-color), -1px -1px 0 var(--primary-color); 
                transform: translate(2px, -2px); 
            }
        }
    
        .glitch {
            animation: glitch 0.5s infinite;
            color: var(--primary-color);
            text-shadow: 0 0 5px var(--primary-color), 0 0 10px var(--primary-color), 0 0 15px var(--secondary-color), 0 0 20px var(--secondary-color);
        }

    </style>
</head>
<body>
    <h1 class="site-title">TheAnswerIsPong</h1>
    <div class="icon-container">
        <div class="fullscreen-icon" onclick="toggleFullscreen()">
            <i class="fas fa-expand"></i>
        </div>
    </div>

    <div class="container" id="login-container">
        <h2>Iniciar Sesión</h2>
        <div class="input-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com">
        </div>
        <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="********">
        </div>
        <button>Ingresar</button>
        <div class="switch">
            ¿No tienes cuenta? <a href="#" onclick="toggleForm()">Regístrate</a>
        </div>
    </div>

    <div class="container" id="register-container" style="display: none;">
        <h2>Registrarse</h2>
        <div class="input-group">
            <label for="name">Nombre de usuario</label>
            <input type="text" id="name" placeholder="Username">
        </div>
        <div class="input-group">
            <label for="reg-email">Correo Electrónico</label>
            <input type="email" id="reg-email" placeholder="ejemplo@correo.com">
        </div>
        <div class="input-group">
            <label for="reg-password">Contraseña</label>
            <input type="password" id="reg-password" placeholder="********">
        </div>
        <button>Registrarse</button>
        <div class="switch">
            ¿Ya tienes cuenta? <a href="#" onclick="toggleForm()">Inicia sesión</a>
        </div>
    </div>

    <script>
        function toggleForm() {
            
            let loginContainer = document.getElementById('login-container');
            let registerContainer = document.getElementById('register-container');
            
            if (loginContainer.style.display === 'none') {
                loginContainer.style.display = 'block';
                registerContainer.style.display = 'none';
            } else {
                loginContainer.style.display = 'none';
                registerContainer.style.display = 'block';
            }
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        const title = document.querySelector('.site-title');
        title.addEventListener('mouseenter', () => {
            title.classList.add('glitch');
            title.style.transform = 'translateY(-5px)';
        });
    
        title.addEventListener('mouseleave', () => {
            title.classList.remove('glitch');
            title.style.transform = 'translateY(0)';
        });
        
    </script>
</body>
</html>
